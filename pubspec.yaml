name: fingroup_app_flutter
description: Gerenciamento financeiro para Mozis - MVP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  google_sign_in: ^6.2.1

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  uuid: ^4.5.1
  intl: ^0.19.0

  google_fonts: ^6.2.1
  pin_code_fields: ^8.0.1   # Input OTP
  country_code_picker: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
